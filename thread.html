<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polly Fourms - Thread</title>
  <meta property="og:title" content="Polly Fourms - Thread Discussion" />
  <meta property="og:description" content="Join the discussion on this thread." />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://ezzp024.github.io/polly-fourms/thread.html" />
  <meta name="twitter:card" content="summary" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700;800&family=Literata:opsz,wght@7..72,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="top-strip">
    <div class="container top-strip-inner">
      <p>Polly Fourms thread discussion</p>
      <form id="identityForm" class="identity-form" autocomplete="off">
        <label class="visually-hidden" for="nickname">Nickname</label>
        <input id="nickname" name="nickname" type="text" maxlength="24" placeholder="Your nickname" required />
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <header class="site-head container">
    <a class="logo-block" href="index.html">
      <span class="logo-badge">PF</span>
      <span>
        <strong>Polly Fourms</strong>
        <small>Open Source Board Network</small>
      </span>
    </a>
  </header>

  <nav class="main-nav">
    <div class="container nav-inner">
      <a href="index.html">Forum Index</a>
      <a href="releases.html">Downloads</a>
      <a href="auth.html">Login</a>
      <a href="profile.html">Members</a>
      <a class="discord-btn" href="https://discord.gg/4wZAZC8Za" target="_blank" rel="noopener noreferrer">Discord</a>
    </div>
  </nav>

  <div class="sub-breadcrumb">
    <div class="container" id="breadcrumb">Forum Index > Thread</div>
  </div>

  <main class="container layout-grid">
    <section class="panel">
      <div class="panel-head">
        <h1 id="threadTitle">Loading thread...</h1>
      </div>

      <div class="thread-box">
        <div class="thread-actions">
          <button type="button" id="copyThreadLink">Copy Thread Link</button>
          <button type="button" id="shareThread">Share</button>
          <button type="button" id="quoteReply">Quote Main Post</button>
          <button type="button" id="bookmarkThread">Bookmark</button>
          <button type="button" id="reportThread">Report Thread</button>
          <button type="button" id="editThread" class="owner-only">Edit</button>
          <button type="button" id="deleteThread" class="owner-only">Delete</button>
          <button type="button" id="togglePin" class="moderator-only">Pin</button>
          <button type="button" id="toggleSticky" class="moderator-only">Sticky</button>
          <button type="button" id="toggleLock" class="moderator-only">Lock</button>
          <button type="button" id="toggleSolved" class="moderator-only">Solved</button>
          <button type="button" id="toggleHide" class="moderator-only">Hide</button>
        </div>

        <article id="threadPost" class="thread-post"></article>

        <h2>Replies</h2>
        <div id="commentsList"></div>

        <h3>Post Reply</h3>
        <form id="replyForm" class="compose-box" autocomplete="off">
          <label>Message</label>
          <div class="textarea-wrapper"><textarea name="body" id="replyBody" rows="4" maxlength="500" required></textarea><button type="button" class="emoji-btn" data-target="replyBody">😀</button></div>
          <button type="submit">Submit Reply</button>
        </form>
      </div>
    </section>

    <aside class="sidebar">
      <section class="panel mini-panel">
        <h2>Thread Actions</h2>
        <a id="backToSection" href="forum.html">Back to section</a>
        <a href="index.html">Back to forum index</a>
      </section>

      <section class="panel mini-panel">
        <h2>Related Threads</h2>
        <div id="relatedThreads" class="stack-list"></div>
      </section>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="forum-api.js"></script>
  <script src="common.js"></script>
  <script src="thread.js"></script>
</body>
</html>
