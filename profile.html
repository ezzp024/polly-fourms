<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polly Fourms - Member Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700;800&family=Literata:opsz,wght@7..72,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="top-strip">
    <div class="container top-strip-inner">
      <p>Polly Fourms member profile</p>
      <form id="identityForm" class="identity-form" autocomplete="off">
        <label class="visually-hidden" for="nickname">Nickname</label>
        <input id="nickname" name="nickname" type="text" maxlength="24" placeholder="Your nickname" required />
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <header class="site-head container">
    <a class="logo-block" href="index.html">
      <span class="logo-badge">PF</span>
      <span>
        <strong>Polly Fourms</strong>
        <small>Open Source Board Network</small>
      </span>
    </a>
  </header>

  <nav class="main-nav">
    <div class="container nav-inner">
      <a href="index.html">Forum Index</a>
      <a href="releases.html">Downloads</a>
      <a href="auth.html">Login</a>
      <a class="is-active" href="profile.html">Members</a>
      <a class="admin-only" href="admin.html">Admin Panel</a>
    </div>
  </nav>

  <main class="container layout-grid">
    <section class="panel">
      <div class="panel-head">
        <h1 id="profileName">Member Profile</h1>
        <p id="profileMeta"></p>
      </div>

      <div class="profile-card" id="profileCard"></div>

      <div class="split-block">
        <section>
          <h2>Recent Threads</h2>
          <div id="recentThreads" class="stack-list"></div>
        </section>
        <section>
          <h2>Recent Replies</h2>
          <div id="recentReplies" class="stack-list"></div>
        </section>
      </div>
    </section>

    <aside class="sidebar">
      <section class="panel mini-panel">
        <h2>Member Directory</h2>
        <input id="memberSearch" type="search" placeholder="Search member..." />
        <div id="memberDirectory" class="stack-list"></div>
      </section>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="forum-api.js"></script>
  <script src="common.js"></script>
  <script src="profile.js"></script>
</body>
</html>
