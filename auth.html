<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polly Fourms - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700;800&family=Literata:opsz,wght@7..72,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-head container">
    <a class="logo-block" href="index.html">
      <span class="logo-badge">PF</span>
      <span>
        <strong>Polly Fourms</strong>
        <small>Account Login / Register</small>
      </span>
    </a>
  </header>

  <main class="container layout-grid">
    <section class="panel">
      <div class="panel-head">
        <h1>Account Access</h1>
        <p id="authStatus">Use your email and password to register or login.</p>
      </div>

      <div class="compose-box">
        <h2>Register</h2>
        <form id="registerForm" class="row-fields" autocomplete="off">
          <input id="registerEmail" name="register_email_pf" type="email" placeholder="Email" autocomplete="off" required />
          <input id="registerPassword" name="register_password_pf" type="password" placeholder="Password" autocomplete="new-password" required />
          <button type="submit">Create Account</button>
        </form>

        <h2>Login</h2>
        <form id="loginForm" class="row-fields" autocomplete="off">
          <input id="loginEmail" name="login_email_pf" type="email" placeholder="Email" autocomplete="off" required />
          <input id="loginPassword" name="login_password_pf" type="password" placeholder="Password" autocomplete="off" required />
          <button type="submit">Login</button>
        </form>

        <div class="thread-actions">
          <button type="button" id="checkSession">Check Session</button>
          <button type="button" id="logoutBtn">Logout</button>
          <a href="index.html">Back to Forum</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="auth.js"></script>
</body>
</html>
